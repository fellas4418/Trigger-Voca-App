<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca v8.0 - Master Logic Full Edition</title>
    
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" 
            integrity="sha384-l+xbElFSnPZ2rOaPrU//2FF5B4LB8FiX5q4fXYTlfcG4PGpMkE1vcL7kNXI6Cci0" 
            crossorigin="anonymous"></script>

    <style>
        /* ---------------------------------------------------------
           [CSS Section] Doodle UI 디자인 시스템 (전체 보존) [cite: 2026-03-05]
        --------------------------------------------------------- */
        :root {
            --primary: #ff6b4a; /* 주황 포인트 컬러 */
            --bg: #fdf6e3;    /* 크림 배경 컬러 */
            --white: #ffffff;
            --dark: #333333;
            --green: #4caf50;
            --error: #e53935;
            --shadow: 8px 8px 0px 0px #333333;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Nanum Pen Script', sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
        }

        #app {
            width: 94%;
            max-width: 420px;
            text-align: center;
        }

        .app-header {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: underline wavy var(--primary);
        }

        .view {
            display: none;
            background-color: var(--white);
            padding: 45px 30px;
            border-radius: 40px 10px 40px 10px;
            border: 4px solid var(--dark);
            box-shadow: var(--shadow);
        }

        .view.active {
            display: block;
        }

        /* [cite: 2026-03-05] 입력 폼 스타일 */
        input {
            width: 100%;
            padding: 22px;
            margin: 15px 0;
            border: 3.5px solid var(--dark);
            border-radius: 18px;
            box-sizing: border-box;
            font-size: 1.15rem;
            font-weight: 900;
            box-shadow: 4px 4px 0px 0px #eeeeee;
        }

        .benefit-tag {
            background-color: #fff3e0;
            color: #ef6c00;
            font-size: 0.95rem;
            font-weight: 900;
            padding: 12px 20px;
            border-radius: 20px 8px;
            border: 3px solid #ef6c00;
            display: inline-block;
            margin-bottom: 30px;
        }

        .agree-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            margin: 30px 0;
            text-align: left;
            cursor: pointer;
        }

        .agree-container input {
            width: 30px;
            height: 30px;
            cursor: pointer;
            border: 3.5px solid var(--dark);
        }

        .agree-container label {
            font-size: 1rem;
            font-weight: 900;
            color: #444444;
            cursor: pointer;
            user-select: none;
        }

        /* [cite: 2026-03-05] 버튼 시스템 */
        button {
            background-color: var(--primary);
            color: var(--white);
            border: 4.5px solid var(--dark);
            padding: 24px;
            border-radius: 20px 8px 20px 8px;
            font-size: 1.45rem;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 6px 6px 0px 0px var(--dark);
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px 0px var(--dark);
        }

        button:disabled {
            background-color: #cccccc !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none;
        }

        /* [cite: 2026-03-05] 반복 설정 버튼 레이아웃 */
        .option-box {
            background: #ffffff;
            border: 4px solid var(--dark);
            border-radius: 22px;
            padding: 25px;
            margin-bottom: 35px;
            box-shadow: 6px 6px 0px 0px #eeeeee;
            text-align: left;
        }

        .option-label {
            font-weight: 900;
            display: block;
            margin-bottom: 15px;
            color: var(--dark);
            font-size: 1.05rem;
        }

        .repeat-btn-group {
            display: flex;
            gap: 12px;
        }

        /* 버튼 내부 텍스트 줄바꿈 적용 */
        .rep-choice {
            padding: 14px 10px;
            font-size: 1.1rem;
            background-color: #f0f0f0;
            color: #777777;
            border: 3.5px solid var(--dark);
            box-shadow: 4px 4px 0px 0px #cccccc;
            cursor: pointer;
            flex: 1;
            line-height: 1.4;
            font-weight: 900;
            border-radius: 15px 5px;
        }

        .rep-choice.active {
            background-color: var(--primary);
            color: var(--white);
            box-shadow: 4px 4px 0px 0px var(--dark);
        }

        /* 시간 바 위치 전면 수정 (게이지 영역 독립 분리) */
        .gauge-area {
            width: 100%;
            height: 20px;
            background: #eeeeee;
            border: 4px solid var(--dark);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
        }

        #timer-bar {
            height: 100%;
            background-color: var(--green);
            width: 0%;
            transition: width 0.3s linear;
        }

        /* [cite: 2026-03-04, 2026-03-05] 학습 카드 본체 */
        .card {
            position: relative;
            padding: 90px 20px;
            border: 4.5px solid var(--dark);
            border-radius: 55px 15px 55px 15px;
            background-color: var(--white);
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden; 
            box-shadow: none; /* 시야 방해 음영 제거 */
        }

        .progress-text {
            position: absolute;
            top: 30px;
            right: 40px;
            font-weight: 900;
            color: #bbbbbb;
            font-size: 1rem;
        }

        /* 글자 길이에 따른 자동 폰트 크기 및 잘림 방지 */
        .word {
            font-size: clamp(2.2rem, 15vw, 4.5rem); 
            font-weight: 900;
            color: var(--dark);
            margin: 0;
            text-shadow: 3px 3px 0px #f0f0f0;
            word-break: break-all;
        }

        .word.small {
            font-size: 2.2rem !important;
        }

        .countdown-overlay {
            font-size: 6.5rem;
            color: var(--primary);
            font-weight: 900;
            margin-top: 30px;
        }

        .meaning {
            font-size: 2.4rem;
            color: #999999;
            opacity: 0.05;
            transition: all 0.4s ease;
            margin: 25px 0;
        }

        .meaning.active {
            opacity: 1;
            color: var(--dark);
            font-weight: 900;
            transform: scale(1.18);
        }

        /* [cite: 2026-03-05] 음성 설정 인터페이스 */
        .audio-ctrl {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .audio-msg {
            font-size: 0.9rem;
            color: #999999;
            font-weight: 900;
            background-color: #ffffff;
            padding: 5px 12px;
            border-radius: 12px;
            border: 2.5px solid #eeeeee;
        }

        #mute-btn {
            background: none;
            border: none;
            box-shadow: none;
            font-size: 2.2rem;
            width: auto;
            padding: 0;
            cursor: pointer;
            transition: 0.2s;
        }

        /* 테스트 보기 버그 수정 (글자색 강제 적용) */
        .test-option {
            background-color: var(--white);
            border: 4px solid var(--dark);
            border-radius: 20px 8px;
            padding: 26px;
            margin-top: 18px;
            font-size: 1.4rem;
            font-weight: 900;
            box-shadow: 6px 6px 0px 0px #eeeeee;
            transition: all 0.2s ease;
            width: 100%;
            cursor: pointer;
            text-align: center;
            color: var(--dark) !important; /* 폰트 강제 노출 [cite: 2026-03-05] */
        }

        .test-option.correct {
            background-color: var(--green) !important;
            color: var(--white) !important;
            border-color: var(--dark);
            box-shadow: 6px 6px 0px 0px var(--dark);
        }

        .test-option.wrong {
            background-color: var(--error) !important;
            color: var(--white) !important;
            border-color: var(--dark);
            box-shadow: 6px 6px 0px 0px var(--dark);
        }

        /* [cite: 2026-03-04, 2026-03-05] 성적표 오버레이 */
        #report-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .report-card {
            background-color: var(--white);
            width: 92%;
            max-width: 400px;
            padding: 55px 45px;
            border-radius: 60px 15px;
            border: 8px solid var(--primary);
            text-align: center;
            box-shadow: 25px 25px 0px 0px rgba(0,0,0,0.3);
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            padding: 22px 0;
            border-bottom: 4px dashed #f0f0f0;
            font-size: 1.35rem;
            font-weight: 900;
        }

        .mention-text {
            margin-top: 45px;
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 900;
            line-height: 1.5;
        }

        .kakao-send {
            background-color: #FEE500;
            color: #3C1E1E;
            margin-top: 45px;
            box-shadow: 8px 8px 0px 0px #3C1E1E;
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="app-header">Trigger Voca</div>

        <div id="view-login" class="view">
            <span class="benefit-tag">🎁 DOODLE EVENT</span>
            <h2 style="margin-bottom:20px; font-size: 1.8rem;">학습자 정보 입력</h2>
            <input type="text" id="user-name" placeholder="성함 (필수)">
            <input type="tel" id="user-phone" placeholder="전화번호 전체 (선택)">
            <div class="agree-container" onclick="document.getElementById('user-agree').click()">
                <input type="checkbox" id="user-agree" onclick="event.stopPropagation()">
                <label for="user-agree">데이터 기록 및 서비스 보관 동의 (필수)</label>
            </div>
            <button onclick="handleLogin()">학습 시작하기!</button>
        </div>

        <div id="view-mode" class="view">
            <h2 id="welcome-msg" style="margin-bottom:35px; font-size: 1.9rem;"></h2>
            
            <div class="option-box">
                <span class="option-label">학습 강도 설정</span>
                <div class="repeat-btn-group">
                    <button id="btn-rep2" class="rep-choice active" onclick="updateRepeat(2)">2회 반복<br>(기본)</button>
                    <button id="btn-rep3" class="rep-choice" onclick="updateRepeat(3)">3회 반복<br>(강력)</button>
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:22px;">
                <button onclick="pickCourse('middle')" style="background-color:#bdbdbd;">중등 코스</button>
                <button onclick="pickCourse('high')" style="background-color:#2196F3;">고등 코스</button>
            </div>

            <div id="cooldown-area" style="display:none; margin-top:40px; padding:25px; border:4px solid #ef6c00; border-radius:24px; font-weight:900; color:#ef6c00; background-color:#fff3e0;"></div>
            
            <button id="admin-reset" onclick="forceReset()" 
                    style="display:none; background:none; border:none; color:#999; text-decoration:underline; margin-top:35px; cursor:pointer; font-weight: 900;">
                (테스트용) 데이터 초기화
            </button>
        </div>

        <div id="view-study" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="location.reload()" style="background:none; border:none; color:#666; font-weight:900; width:auto; padding:0; box-shadow:none;">← 메인으로</button>
                <div class="audio-ctrl">
                    <span class="audio-msg">소리를 들어보세요.</span>
                    <button id="mute-btn" onclick="toggleAudio()">🔊</button>
                </div>
            </div>

            <div class="gauge-area"><div id="timer-bar"></div></div>

            <div class="card">
                <div id="word-progress" class="progress-text"></div>
                <h1 id="display-word" class="word">Trigger</h1>
                <div id="countdown-num" class="countdown-overlay" style="display:none;"></div>
                <div id="meanings-box"></div>
                <div id="test-box" style="display:none; width: 100%;"></div>
            </div>

            <div id="start-btn-area">
                <button id="skip-count-btn" onclick="skipCountdown()">바로 시작!</button>
            </div>
            
            <div id="pause-area" style="display:none; margin-top:30px;">
                <button id="pause-btn" onclick="handlePause()" style="background-color:#ff9800;">일시 중지</button>
            </div>
        </div>
    </div>

    <div id="report-overlay">
        <div class="report-card">
            <h2 id="rep-name"></h2>
            <div class="stat-line"><span>학습 코스</span><b id="rep-course"></b></div>
            <div class="stat-line"><span>테스트 점수</span><b id="rep-score" style="color:var(--primary);"></b></div>
            <div class="stat-line"><span>오늘의 세션</span><b id="rep-session"></b></div>
            <p id="rep-mention" class="mention-text"></p>
            <button class="kakao-send" onclick="kakaoShare()">💬 학부모님께 결과 전송</button>
            <p onclick="location.reload()" style="margin-top:40px; color:#aaa; cursor:pointer; font-weight:900; text-decoration:underline;">닫기</p>
        </div>
    </div>

    <script>
        /* ---------------------------------------------------------
           [JavaScript] 비즈니스 로직 완결판 (Full Script) [cite: 2026-03-05]
        --------------------------------------------------------- */
        
        try { 
            Kakao.init('fbb1520306ffaad0a882e993109a801c'); 
        } catch(e) { console.error("SDK Load Fail"); }

        const library = {
            middle: [
                {word:"appear", mean:["나타나다", "보이다"], color:"#E8F5E9", wrong:["사라지다", "공부하다", "달리다"]},
                {word:"happen", mean:["일어나다", "발생하다"], color:"#E8F5E9", wrong:["멈추다", "잠자다", "먹다"]}
            ],
            high: [
                {word:"analyze", mean:["분석하다"], color:"#FFF3E0", wrong:["결합하다", "무시하다", "창조하다"]},
                {word:"acquire", mean:["습득하다", "얻다"], color:"#FFF3E0", wrong:["버리다", "잃다", "판매하다"]}
            ]
        };

        // 실제 오답 기록이 없을 때를 위한 샘플 [cite: 2026-03-05]
        const fallbackReview = [
            {word:"memory", mean:["기억"], wrong:["망각", "사랑", "하늘"]},
            {word:"focus", mean:["집중하다"], wrong:["흐리다", "달리다", "자다"]}
        ];

        let user = { name: "" }, mode = "", repeats = 2, isPaused = false, activeStudy = false, muted = false;
        let timerId = null, score = 0, countdownAborted = false, inReview = false;

        window.onload = function() {
            const data = localStorage.getItem('tv_user_info');
            if (data) {
                user = JSON.parse(data);
                document.getElementById('welcome-msg').innerText = `${user.name}님,`;
                changeView('view-mode');
                runCooldownCheck(); [cite: 2026-03-05]
            } else { changeView('view-login'); }
        };

        function handleLogin() {
            const n = document.getElementById('user-name').value.trim();
            if(!n || !document.getElementById('user-agree').checked) return alert("성함과 동의가 필수입니다!");
            user = { name: n, phone: document.getElementById('user-phone').value.trim() || "0" };
            localStorage.setItem('tv_user_info', JSON.stringify(user));
            location.reload();
        }

        function updateRepeat(count) {
            repeats = count;
            document.getElementById('btn-rep2').classList.toggle('active', count === 2);
            document.getElementById('btn-rep3').classList.toggle('active', count === 3);
        }

        function toggleAudio() { muted = !muted; document.getElementById('mute-btn').innerText = muted ? "🔇" : "🔊"; }
        function playWord(txt) { if (muted) return; const s = new SpeechSynthesisUtterance(txt); s.lang = 'en-US'; s.rate = 0.8; window.speechSynthesis.speak(s); }

        function changeView(id) {
            const views = document.querySelectorAll('.view');
            views.forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'view-study') autoCountdown();
        }

        function pickCourse(m) { mode = m; changeView('view-study'); }

        async function autoCountdown() {
            countdownAborted = false;
            const display = document.getElementById('display-word');
            const countOverlay = document.getElementById('countdown-num');
            display.innerText = "준비해 주세요"; display.classList.add('small');
            countOverlay.style.display = 'block';

            for(let i=3; i > 0; i--) {
                if(countdownAborted) break;
                countOverlay.innerText = i;
                await new Promise(r => setTimeout(r, 1000));
            }
            if(!activeStudy) launchReviewStep(); [cite: 2026-03-05]
        }

        function skipCountdown() { countdownAborted = true; launchReviewStep(); }

        /* 실전 오답 기반 복습 관문 로직 */
        async function launchReviewStep() {
            if(activeStudy) return;
            activeStudy = true;
            inReview = true;
            
            document.getElementById('countdown-num').style.display = 'none';
            document.getElementById('display-word').classList.remove('small');
            document.getElementById('start-btn-area').style.display = 'none';
            
            // 실제 기기에 저장된 오답 리스트 로드
            const errorPool = JSON.parse(localStorage.getItem('tv_error_pool') || '[]');
            const reviewWords = errorPool.length > 0 ? errorPool.slice(-3) : fallbackReview;
            
            document.getElementById('display-word').innerText = "누적 복습 시작!";
            await new Promise(r => setTimeout(r, 1500));

            for(let i=0; i < reviewWords.length; i++) {
                document.getElementById('word-progress').innerText = `REVIEW: ${i+1}/${reviewWords.length}`;
                await testQuestion(reviewWords[i], 4000); 
            }
            
            inReview = false;
            launchMainSession(); [cite: 2026-03-05]
        }

        async function launchMainSession() {
            document.getElementById('pause-area').style.display = 'flex';
            document.getElementById('test-box').style.display = 'none';
            const words = library[mode];
            for(let i=0; i < words.length; i++) {
                for(let r=0; r < repeats; r++) {
                    if(!activeStudy) return;
                    document.getElementById('word-progress').innerText = `${i+1} / ${words.length} (${r+1}/${repeats}회차)`;
                    playWord(words[i].word); // 회차마다 발음
                    await wordCycle(words[i], 6000);
                }
            }
            runMasterTest();
        }

        function wordCycle(data, time) {
            return new Promise(resolve => {
                const bar = document.getElementById('timer-bar');
                document.getElementById('display-word').innerText = data.word;
                document.body.style.backgroundColor = data.color;
                document.getElementById('meanings-box').innerHTML = data.mean.map(m => `<div class="meaning">${m}</div>`).join('');
                let elapsed = 0; if(timerId) clearInterval(timerId);
                timerId = setInterval(() => {
                    if(!isPaused) {
                        elapsed += 100; bar.style.width = (elapsed / time * 100) + '%';
                        const list = document.querySelectorAll('.meaning');
                        const idx = Math.floor((elapsed / time) * data.mean.length);
                        list.forEach((el, i) => { if(i === idx) el.classList.add('active'); else el.classList.remove('active'); });
                        if(elapsed >= time) { clearInterval(timerId); resolve(); }
                    }
                }, 100);
            });
        }

        async function runMasterTest() {
            document.getElementById('pause-area').style.display = 'none';
            document.getElementById('meanings-box').innerHTML = "";
            const testBox = document.getElementById('test-box');
            testBox.style.display = 'block';
            score = 0; const words = library[mode];
            for(let i=0; i < words.length; i++) {
                document.getElementById('word-progress').innerText = `TEST: ${i+1} / ${words.length}`;
                await testQuestion(words[i], 5000); 
            }
            showFinalReport();
        }

        function testQuestion(data, limit) {
            return new Promise(resolve => {
                document.getElementById('display-word').innerText = data.word;
                document.body.style.backgroundColor = "#ffffff";
                const box = document.getElementById('test-box');
                const pool = [...data.wrong, data.mean[0]].sort(() => Math.random() - 0.5);
                box.innerHTML = "";
                pool.forEach(txt => {
                    const b = document.createElement('button');
                    b.className = 'test-option'; b.innerText = txt;
                    b.onclick = () => {
                        clearInterval(timerId);
                        const allBtns = document.querySelectorAll('.test-option');
                        allBtns.forEach(btn => {
                            btn.disabled = true;
                            if(btn.innerText === data.mean[0]) btn.classList.add('correct');
                            else if(btn === b) btn.classList.add('wrong');
                        });
                        if(txt === data.mean[0]) {
                            score++;
                        } else {
                            saveToErrorPool(data); // 오답 기록
                        }
                        setTimeout(resolve, 1200);
                    };
                    box.appendChild(b);
                });

                let elapsed = 0; if(timerId) clearInterval(timerId);
                timerId = setInterval(() => {
                    elapsed += 100; document.getElementById('timer-bar').style.width = (100 - (elapsed / limit * 100)) + '%';
                    if(elapsed >= limit) { 
                        clearInterval(timerId); 
                        saveToErrorPool(data); // 시간 초과도 오답 기록
                        document.querySelectorAll('.test-option').forEach(b => { if(b.innerText === data.mean[0]) b.classList.add('correct'); b.disabled = true; });
                        setTimeout(resolve, 1200);
                    }
                }, 100);
            });
        }

        /* 오답 데이터 로컬 스토리지 누적 함수 */
        function saveToErrorPool(wordObj) {
            let pool = JSON.parse(localStorage.getItem('tv_error_pool') || '[]');
            if (!pool.find(i => i.word === wordObj.word)) {
                pool.push(wordObj);
                if (pool.length > 50) pool.shift(); // 최신 50개 유지
                localStorage.setItem('tv_error_pool', JSON.stringify(pool));
            }
        }

        function handlePause() {
            isPaused = !isPaused; const b = document.getElementById('pause-btn');
            b.innerText = isPaused ? "다시 시작" : "일시 중지";
            b.style.backgroundColor = isPaused ? "#4CAF50" : "#ff9800";
        }

        function getFeedback(pct) {
            if(pct >= 100) return "Mastered! 상위 0.1% 어휘력에 도달했습니다! 🏆";
            if(pct >= 90) return "Excellent! 당신은 이제 상위 1% 우등생입니다! ⭐";
            if(pct >= 70) return "Great Job! 조금만 더 하면 완벽해집니다! 👍";
            return "Good Try! 반복 학습이 장기 기억의 지름길입니다! 🔥";
        }

        function showFinalReport() {
            const key = `tv_stats_${user.name}_${user.phone}`;
            const stats = JSON.parse(localStorage.getItem(key) || '{"sessions":0, "lastTime":0}');
            stats.sessions++; stats.lastTime = Date.now();
            localStorage.setItem(key, JSON.stringify(stats));
            const pct = (score / library[mode].length) * 100;
            document.getElementById('rep-name').innerText = `${user.name}님, 완수!🎯`;
            document.getElementById('rep-course').innerText = (mode === 'middle' ? '중등' : '고등');
            document.getElementById('rep-score').innerText = `${score} / ${library[mode].length} 점`;
            document.getElementById('rep-session').innerText = `${stats.sessions}회차`;
            document.getElementById('rep-mention').innerText = getFeedback(pct);
            document.getElementById('report-overlay').style.display = 'flex';
        }

        function kakaoShare() {
            const stats = JSON.parse(localStorage.getItem(`tv_stats_${user.name}_${user.phone}`));
            const pct = (score / library[mode].length) * 100;
            const msg = `[트리거보카] 학습 리포트\n\n- 코스: ${mode}\n- 점수: ${score}/${library[mode].length}\n- 오늘 누적 세션: ${stats.sessions}회\n\n원장님 총평: ${getFeedback(pct)}`;
            if (Kakao.isInitialized()) {
                Kakao.Share.sendDefault({ objectType: 'text', text: msg, link: { mobileWebUrl: window.location.href, webUrl: window.location.href } });
            } else { alert("결과가 복사되었습니다!"); }
        }

        function runCooldownCheck() {
            const stats = JSON.parse(localStorage.getItem(`tv_stats_${user.name}_${user.phone}`) || '{"sessions":0, "lastTime":0}');
            const diff = Date.now() - stats.lastTime;
            const wait = 600000;
            if(diff < wait && stats.sessions > 0) {
                document.querySelectorAll('.course-btn').forEach(b => b.disabled = true);
                const area = document.getElementById('cooldown-area'); area.style.display = 'block';
                document.getElementById('admin-reset').style.display = 'inline-block';
                const itv = setInterval(() => {
                    const rem = wait - (Date.now() - stats.lastTime);
                    if(rem <= 0) { clearInterval(itv); location.reload(); }
                    else area.innerText = `⏳ 휴식 중: ${Math.floor(rem/60000)}분 ${Math.floor((rem%60000)/1000)}초 남음`;
                }, 1000);
            }
        }
        function forceReset() { localStorage.removeItem(`tv_stats_${user.name}_${user.phone}`); localStorage.removeItem('tv_error_pool'); location.reload(); }
    </script>
</body>
</html>
