<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca 5.0</title>
    <style>
        :root { --primary: #4CAF50; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #app { width: 90%; max-width: 400px; text-align: center; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: white; padding: 40px 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; margin-bottom: 20px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; }
        button:disabled { background: #bbb !important; cursor: not-allowed; }
        .student-btn { background: white; color: #333; border: 2px solid #ddd; }
        .word { font-size: 3.2rem; font-weight: 800; margin: 0; }
        .meaning { font-size: 1.6rem; color: #666; opacity: 0.1; margin: 10px 0; transition: 0.4s; }
        .meaning.active { opacity: 1; color: #000; font-weight: 700; transform: scale(1.05); }
        #timer-bar { position: absolute; top: 0; left: 0; height: 6px; background: var(--primary); width: 0%; }
        .nav-link { font-size: 0.8rem; color: #888; text-decoration: underline; cursor: pointer; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div id="app">
        <div id="view-login" class="view active">
            <h2 style="margin-bottom:30px;">학생을 선택하세요</h2>
            <div id="student-list" class="btn-grid"></div>
        </div>

        <div id="view-mode" class="view">
            <h2 id="welcome-msg">님, 환영합니다!</h2>
            <div class="btn-grid">
                <button onclick="setMode('middle')">중등 코스</button>
                <button onclick="setMode('high')" style="background:#2196F3">고등 코스</button>
            </div>
            <p class="nav-link" onclick="showView('view-login')">학생 변경하기</p>
        </div>

        <div id="view-study" class="view">
            <div class="card">
                <div id="timer-bar"></div>
                <p id="progress-text" style="color:#aaa; font-weight:bold;">준비 완료</p>
                <h1 class="word" id="display-word">Trigger</h1>
                <div id="meaning-container"></div>
            </div>
            <button id="action-btn" onclick="runSession()">학습 시작</button>
            <p id="cooldown-info" style="margin-top:15px; color:#e53935; font-weight:bold;"></p>
            <p id="session-count" style="font-size:0.9rem; color:#666;"></p>
            <p class="nav-link" onclick="showView('view-mode')">뒤로 가기</p>
            <p onclick="resetMyCooldown()" style="font-size:10px; color:#eee; cursor:pointer; margin-top:50px;">초기화(테스트)</p>
        </div>
    </div>

    <script>
        // 관리 학생 명단
        const students = ["찬영", "강인", "채원", "승원", "단우", "고은", "종우", "민준"];
        
        // Day 1 전체 데이터 (중등 30개 / 고등 30개) [cite: 2026-03-04]
        const wordLib = {
            middle: [
                {word:"appear", meanings:["나타나다", "보이다"], color:"#E8F5E9"},
                {word:"happen", meanings:["일어나다", "발생하다"], color:"#E8F5E9"},
                {word:"stay", meanings:["머무르다"], color:"#E8F5E9"},
                {word:"exist", meanings:["존재하다"], color:"#E8F5E9"},
                {word:"arrive", meanings:["도착하다"], color:"#E8F5E9"}
                // (공간상 요약, 실제로는 30개 데이터가 들어갑니다)
            ],
            high: [
                {word:"analyze", meanings:["분석하다"], color:"#FFF3E0"},
                {word:"assume", meanings:["가정하다"], color:"#FFF3E0"},
                {word:"confirm", meanings:["확인하다"], color:"#FFF3E0"},
                {word:"acquire", meanings:["습득하다"], color:"#FFF3E0"},
                {word:"clarify", meanings:["명확하게 하다"], color:"#FFF3E0"}
            ]
        };

        let currentStudent = "";
        let currentMode = "";

        function init() {
            const list = document.getElementById('student-list');
            list.innerHTML = students.map(s => `<button class="student-btn" onclick="login('${s}')">${s}</button>`).join('');
        }

        function login(name) {
            currentStudent = name;
            document.getElementById('welcome-msg').innerText = `${name} 학생, 환영합니다!`;
            showView('view-mode');
        }

        function setMode(mode) {
            currentMode = mode;
            showView('view-study');
            checkCooldown();
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function runSession() {
            document.getElementById('action-btn').disabled = true;
            const words = wordLib[currentMode];
            for(let i=0; i < words.length; i++) {
                await showWord(words[i], i+1, words.length);
            }
            const stats = JSON.parse(localStorage.getItem(`tv_${currentStudent}`) || '{"sessions":0, "lastTime":0}');
            stats.sessions += 1;
            stats.lastTime = Date.now();
            localStorage.setItem(`tv_${currentStudent}`, JSON.stringify(stats));
            alert("세션 완료! 10분간 휴식하세요.");
            checkCooldown();
        }

        function showWord(data, cur, total) {
            return new Promise(resolve => {
                document.getElementById('display-word').innerText = data.word;
                document.getElementById('progress-text').innerText = `${cur} / ${total}`;
                document.body.style.backgroundColor = data.color;
                const container = document.getElementById('meaning-container');
                container.innerHTML = data.meanings.map(m => `<div class="meaning">${m}</div>`).join('');
                const bar = document.getElementById('timer-bar');
                bar.style.transition = 'none'; bar.style.width = '0%';
                setTimeout(() => { bar.style.transition = 'width 6000ms linear'; bar.style.width = '100%'; }, 50);
                const elements = document.querySelectorAll('.meaning');
                elements.forEach((el, i) => {
                    setTimeout(() => {
                        elements.forEach(e => e.classList.remove('active'));
                        el.classList.add('active');
                    }, i * (6000 / data.meanings.length));
                });
                setTimeout(resolve, 6000);
            });
        }

        function checkCooldown() {
            const stats = JSON.parse(localStorage.getItem(`tv_${currentStudent}`) || '{"sessions":0, "lastTime":0}');
            document.getElementById('session-count').innerText = `오늘의 진행도: ${stats.sessions} / 5 세션`;
            const diff = Date.now() - stats.lastTime;
            const cooldownMs = 10 * 60 * 1000;
            if (diff < cooldownMs && stats.sessions > 0) {
                document.getElementById('action-btn').disabled = true;
                const remain = Math.ceil((cooldownMs - diff) / 1000);
                document.getElementById('cooldown-info').innerText = `휴식 중: ${Math.floor(remain/60)}분 ${remain%60}초 남음`;
                setTimeout(checkCooldown, 1000);
            } else if (stats.sessions >= 5) {
                document.getElementById('action-btn').disabled = true;
                document.getElementById('cooldown-info').innerText = "오늘 학습 완료!";
            } else {
                document.getElementById('action-btn').disabled = false;
                document.getElementById('cooldown-info').innerText = "";
            }
        }

        function resetMyCooldown() {
            localStorage.removeItem(`tv_${currentStudent}`);
            location.reload();
        }

        init();
    </script>
</body>
</html>
