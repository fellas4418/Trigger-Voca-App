<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca v6.1</title>
    <style>
        :root { --primary: #4CAF50; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #app { width: 90%; max-width: 400px; text-align: center; }
        .view { display: none; background: white; padding: 35px 25px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .view.active { display: block; }
        input { width: 100%; padding: 18px; margin: 12px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        .benefit-tag { background: #fff3e0; color: #ef6c00; font-size: 0.85rem; font-weight: bold; padding: 8px 15px; border-radius: 8px; display: inline-block; margin-bottom: 20px; }
        /* 체크박스 영역: label for 방식으로 확실하게 클릭 보장 [cite: 2026-03-05] */
        .agree-container { display: flex; align-items: center; justify-content: flex-start; gap: 12px; margin: 25px 0; text-align: left; }
        .agree-container input { width: 22px; height: 22px; cursor: pointer; margin: 0; flex-shrink: 0; }
        .agree-container label { font-size: 0.9rem; color: #555; cursor: pointer; user-select: none; }
        button { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .card { position: relative; padding: 60px 10px; border: 1px solid #f0f0f0; border-radius: 24px; margin: 20px 0; background: #fff; min-height: 220px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .word { font-size: 3.5rem; font-weight: 800; margin: 0; color: #1a1a1a; }
        .meaning { font-size: 1.8rem; color: #888; opacity: 0.1; transition: 0.4s; margin: 15px 0; }
        .meaning.active { opacity: 1; color: #000; font-weight: 700; transform: scale(1.1); }
        #timer-bar { position: absolute; top: 0; left: 0; height: 6px; background: var(--primary); width: 0%; }
        .ctrl-group { display: flex; gap: 10px; margin-top: 15px; }
        #pause-btn { background: #ff9800; } /* 일시중지 버튼 색상 [cite: 2026-03-05] */
    </style>
</head>
<body>
    <div id="app">
        <div id="view-login" class="view active">
            <span class="benefit-tag">🎁 POINT EVENT</span>
            <h3 style="margin-top:0;">학습자 정보 입력</h3>
            <input type="text" id="user-name" placeholder="성함 (필수)">
            <input type="tel" id="user-phone" placeholder="전화번호 (예: 010-0000-0000)">
            <div class="agree-container">
                <input type="checkbox" id="user-agree">
                <label for="user-agree">[필수] 서비스 이용 및 데이터 기록 동의</label>
            </div>
            <button onclick="handleLogin()">학습 시작하기</button>
        </div>

        <div id="view-mode" class="view">
            <h2 id="welcome-msg" style="margin-bottom:10px;"></h2>
            <p style="color:#666; margin-bottom:30px;">오늘의 단어 학습을 시작합니다.</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <button onclick="selectCourse('middle')">중등 코스</button>
                <button onclick="selectCourse('high')" style="background:#2196F3">고등 코스</button>
            </div>
        </div>

        <div id="view-study" class="view">
            <div class="card">
                <div id="timer-bar"></div>
                <h1 class="word" id="display-word">Trigger</h1>
                <div id="meaning-container"></div>
            </div>
            <div id="pre-study-btn">
                <button onclick="startVoca()">지금 바로 주입</button>
            </div>
            <div id="pause-area" style="display:none;" class="ctrl-group">
                <button id="pause-btn" onclick="togglePause()">일시 중지</button>
            </div>
            <p id="cooldown-info" style="margin-top:15px; color:#e53935; font-weight:bold;"></p>
        </div>
    </div>

    <script>
        const wordLib = {
            middle: [
                {word:"appear", meanings:["나타나다", "보이다"], color:"#E8F5E9"},
                {word:"happen", meanings:["일어나다", "발생하다"], color:"#E8F5E9"}
            ],
            high: [ // 고등 단어 오류 수정 [cite: 2026-03-05]
                {word:"analyze", meanings:["분석하다"], color:"#FFF3E0"},
                {word:"acquire", meanings:["습득하다", "얻다"], color:"#FFF3E0"}
            ]
        };

        let user = { name: "", phone: "" }, mode = "", isPaused = false, wordIdx = 0;

        function handleLogin() {
            const n = document.getElementById('user-name').value.trim();
            const a = document.getElementById('user-agree').checked;
            if(!n || !a) return alert("성함 입력과 이용 동의가 필요합니다.");
            user.name = n;
            user.phone = document.getElementById('user-phone').value.trim() || "unregistered";
            document.getElementById('welcome-msg').innerText = `${n}님,`; [cite: 2026-03-05]
            showView('view-mode');
        }

        function selectCourse(m) { mode = m; showView('view-study'); checkCooldown(); }
        function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        async function startVoca() {
            document.getElementById('pre-study-btn').style.display = 'none';
            document.getElementById('pause-area').style.display = 'flex';
            wordIdx = 0;
            while(wordIdx < wordLib[mode].length) {
                if(!isPaused) {
                    await runCycle(wordLib[mode][wordIdx], wordIdx+1, wordLib[mode].length);
                    wordIdx++;
                } else {
                    await new Promise(r => setTimeout(r, 100)); // 중지 중 대기 [cite: 2026-03-05]
                }
            }
            finish();
        }

        function togglePause() {
            isPaused = !isPaused;
            const b = document.getElementById('pause-btn');
            b.innerText = isPaused ? "다시 시작" : "일시 중지";
            b.style.background = isPaused ? "#4CAF50" : "#ff9800";
        }

        function runCycle(data, cur, total) {
            return new Promise(resolve => {
                const bar = document.getElementById('timer-bar');
                document.getElementById('display-word').innerText = data.word;
                document.body.style.backgroundColor = data.color;
                const container = document.getElementById('meaning-container');
                container.innerHTML = data.meanings.map(m => `<div class="meaning">${m}</div>`).join('');
                
                let ms = 0;
                const timer = setInterval(() => {
                    if(!isPaused) {
                        ms += 100;
                        bar.style.width = (ms / 6000 * 100) + '%';
                        const el = document.querySelectorAll('.meaning');
                        const activeIdx = Math.floor((ms / 6000) * data.meanings.length);
                        el.forEach((e, i) => e.classList.toggle('active', i === activeIdx));
                        if(ms >= 6000) { clearInterval(timer); resolve(); }
                    }
                }, 100);
            });
        }

        function finish() {
            const key = `tv_v61_${user.name}_${user.phone}`;
            const stats = JSON.parse(localStorage.getItem(key) || '{"sessions":0, "lastTime":0}');
            stats.sessions += 1; stats.lastTime = Date.now();
            localStorage.setItem(key, JSON.stringify(stats));
            alert("세션 완료! 10분간 휴식하세요."); [cite: 2026-03-04]
            location.reload();
        }

        function checkCooldown() {
            const key = `tv_v61_${user.name}_${user.phone}`;
            const stats = JSON.parse(localStorage.getItem(key) || '{"sessions":0, "lastTime":0}');
            const diff = Date.now() - stats.lastTime;
            if(diff < 600000 && stats.sessions > 0) {
                document.getElementById('action-btn').disabled = true;
                const rem = Math.ceil((600000 - diff) / 1000);
                document.getElementById('cooldown-info').innerText = `휴식 중: ${Math.floor(rem/60)}분 ${rem%60}초 남음`;
                setTimeout(checkCooldown, 1000);
            }
        }
    </script>
</body>
</html>
