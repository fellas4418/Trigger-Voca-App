<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca v1.3</title>
    <style>
        :root { --primary: #4CAF50; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #app { width: 90%; max-width: 400px; text-align: center; }
        .card { background: white; padding: 40px 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; }
        .word { font-size: 3.5rem; font-weight: 800; margin: 0; color: #1a1a1a; }
        .meaning { font-size: 1.8rem; color: #666; opacity: 0.1; transition: 0.4s; margin: 10px 0; }
        .meaning.active { opacity: 1; color: #000; font-weight: 700; transform: scale(1.1); }
        #timer-bar { position: absolute; top: 0; left: 0; height: 6px; background: var(--primary); width: 0%; }
        button { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: bold; width: 100%; margin-top: 20px; cursor: pointer; }
        button:disabled { background: #bbb; cursor: not-allowed; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; border: none; }
    </style>
</head>
<body>
    <div id="app">
        <div class="tab-menu">
            <button class="tab-btn active" onclick="setMode('middle')">중등</button>
            <button class="tab-btn" onclick="setMode('high')">고등</button>
        </div>
        <div class="card">
            <div id="timer-bar"></div>
            <p id="progress-text" style="color:#aaa; font-weight:bold;">준비 완료</p>
            <h1 class="word" id="display-word">Trigger</h1>
            <div id="meaning-container"></div>
        </div>
        <button id="action-btn" onclick="runSession()">학습 시작</button>
        <p id="info" style="margin-top:15px; color:#888;"></p>
    </div>

    <script>
        // [cite: 2026-03-04] 중등/고등 7일치 데이터 요약본 (실제 운영 시에는 전체 리스트로 확장)
        const wordLib = {
            middle: [
                { word: "appear", meanings: ["나타나다", "보이다"], color: "#E8F5E9" },
                { word: "happen", meanings: ["일어나다", "발생하다"], color: "#E3F2FD" },
                // ... 중등 210단어 데이터 영역
            ],
            high: [
                { word: "analyze", meanings: ["분석하다"], color: "#FFF3E0" },
                { word: "assume", meanings: ["가정하다", "추정하다"], color: "#F3E5F5" },
                // ... 고등 210단어 데이터 영역
            ]
        };

        let currentMode = 'middle';
        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText === (m === 'middle' ? '중등' : '고등')));
        }

        async function runSession() {
            document.getElementById('action-btn').disabled = true;
            const words = wordLib[currentMode].slice(0, 30); // 하루 30개씩 [cite: 2026-03-04]
            
            for(let i=0; i < words.length; i++) {
                await showWord(words[i], i + 1, words.length);
            }
            
            localStorage.setItem('tv_last_time', Date.now());
            alert("세션 완료! 10분간 휴식하세요."); [cite: 2026-03-04]
            location.reload();
        }

        function showWord(data, cur, total) {
            return new Promise(resolve => {
                document.getElementById('display-word').innerText = data.word;
                document.getElementById('progress-text').innerText = `${cur} / ${total}`;
                document.body.style.backgroundColor = data.color;
                const container = document.getElementById('meaning-container');
                container.innerHTML = data.meanings.map(m => `<div class="meaning">${m}</div>`).join('');
                
                const bar = document.getElementById('timer-bar');
                bar.style.transition = 'none'; bar.style.width = '0%';
                setTimeout(() => { bar.style.transition = 'width 6000ms linear'; bar.style.width = '100%'; }, 50);

                const elements = document.querySelectorAll('.meaning');
                elements.forEach((el, i) => {
                    setTimeout(() => {
                        elements.forEach(e => e.classList.remove('active'));
                        el.classList.add('active');
                    }, i * (6000 / data.meanings.length));
                });
                setTimeout(resolve, 6000); // 6초 주입 [cite: 2026-03-04]
            });
        }

        window.onload = () => {
            const last = localStorage.getItem('tv_last_time');
            if (last && (Date.now() - last < 600000)) {
                document.getElementById('action-btn').disabled = true;
                const remain = Math.ceil((600000 - (Date.now() - last)) / 1000);
                document.getElementById('info').innerText = `휴식 중: ${Math.floor(remain/60)}분 ${remain%60}초`;
                setTimeout(() => location.reload(), 1000);
            }
        };
    </script>
</body>
</html>
